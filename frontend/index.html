<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbit — Login</title>
  <link rel="stylesheet" href="login.css" />
  <link rel="stylesheet" href="orbit-ai.css" />
</head>
<body>
  <canvas id="starCanvas"></canvas>
  <div class="space-cursor" id="spaceCursor" aria-hidden="true">
    <span class="rocket-flame"></span>
    <span class="rocket-body"></span>
  </div>

  <div class="card" id="authCard">
    <div class="card-header">
      <span class="logo">✦ Orbit</span>
      <p class="tagline">Your portal to the cosmos</p>
      <div class="auth-shortcuts" aria-label="Orbit pages">
        <a href="photography.html">Photography</a>
        <a href="workshops.html">Dashboard</a>
        <a href="iss.html">ISS Tracker</a>
        <a href="vr.html">VR</a>
        <a href="long-horizon-exchange.html">Time Dilation</a>
        <a href="community.html">Community</a>
      </div>
    </div>

    <div class="tab-switcher">
      <button class="tab active" id="tabLogin" onclick="switchTab('login')">Log In</button>
      <button class="tab" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div id="formLogin" class="form-section">
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button class="forgot" type="button" onclick="handleForgotPassword()">Forgot password?</button>
      <button class="btn-primary" onclick="handleLogin()">Log In</button>
    </div>

    <div id="formSignup" class="form-section hidden">
      <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="Carl Sagan" autocomplete="name" required />
      </div>
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="••••••••" autocomplete="new-password" required />
      </div>
      <button class="btn-primary" onclick="handleSignup()">Create Account</button>
    </div>

    <div class="auth-message hidden" id="authMessage" role="status" aria-live="polite"></div>
  </div>

  <div class="constellation-tooltip hidden" id="tooltip"></div>

  <script src="login.js"></script>
  <script src="orbit-ai.js"></script>
</body>
</html>
